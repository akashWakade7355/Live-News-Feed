<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NewsVista | Latest News</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../style.css" />
  </head>

  <body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand fw-bold fs-2" href="#">
            📰 NewsVista
        </a>

        <div class="ms-auto">
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link active" href="./index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="./bookmarks.html">
                        Bookmarks
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav> 

    <section class="hero">
      <div class="container text-center">
        <h1 class="display-5 fw-bold">Stay Updated with Latest News</h1>

        <p class="lead mt-3">
          Search breaking news from around the world by keyword, city, or
          category.
        </p>
      </div>
    </section>

    <div class="container">
      <div class="card search-card p-4">
        <h2 class="text-center mb-4">🔍 Search News</h2>

        <div class="row g-3">
          <div class="col-md-10">
            <input
              type="text"
              id="input"
              class="form-control search-btn"
              placeholder="Search anything like AI, Cricket, Tesla..."
            />
          </div>

          <div class="col-md-2">
            <button class="btn btn-primary w-100 search-btn" id="search-btn">
              Search
            </button>
          </div>
        </div>

        <hr class="my-4" />

        <div class="row g-3">
          <div class="col-md-5">
            <label class="form-label fw-semibold"> Select City </label>

            <select class="form-select" id="city">
              <option selected disabled>Choose City</option>

              <option>Mumbai</option>
              <option>Delhi</option>
              <option>Bengaluru</option>
              <option>Hyderabad</option>
              <option>Pune</option>
              <option>Chennai</option>
              <option>Kolkata</option>
              <option>Ahmedabad</option>
              <option>Jaipur</option>
              <option>Lucknow</option>
              <option>Chandigarh</option>
              <option>Bhopal</option>
              <option>Indore</option>
              <option>Nagpur</option>
              <option>Patna</option>
              <option>Surat</option>
              <option>Kanpur</option>
              <option>Vadodara</option>
              <option>Visakhapatnam</option>
              <option>Coimbatore</option>
              <option>Kochi</option>
              <option>Mysuru</option>
              <option>Thiruvananthapuram</option>
              <option>Goa</option>
              <option>Bhubaneswar</option>
              <option>Ranchi</option>
              <option>Guwahati</option>
            </select>
          </div>

          <div class="col-md-5">
            <label class="form-label fw-semibold"> Select Category </label>

            <select class="form-select" id="category">
              <option selected disabled>Choose Category</option>

              <option>Business</option>
              <option>Technology</option>
              <option>Sports</option>
              <option>Health</option>
              <option>Entertainment</option>
              <option>Science</option>
              <option>Hollywood</option>
              <option>Bollywood</option>
              <option>Politics</option>
              <option>Education</option>
              <option>Finance</option>
              <option>Economy</option>
              <option>Startups</option>
              <option>Artificial Intelligence</option>
              <option>Gaming</option>
              <option>Automobile</option>
              <option>Travel</option>
              <option>Fashion</option>
              <option>Food</option>
              <option>Cricket</option>
            </select>
          </div>

          <div class="col-md-2 d-grid">
            <button class="btn btn-success search-btn" id="dropdown-btn" style="height: 40px;">
              Search
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container mt-5 mb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">📰 Top Headlines</h2>
      </div>

      <div class="row g-4" id="news-container"></div>
    </div>

    <footer>
      <div class="container">
        © 2026 NewsVista • Made with ❤️ using HTML, CSS, Bootstrap & JavaScript
      </div>
    </footer>


    <script src="../js/script.js"></script>
  </body>
</html>
